name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'smart-tasks-android/src/**'
      - 'smart-tasks-android/public/**'
      - 'smart-tasks-android/index.html'
      - 'smart-tasks-android/package.json'
      - '.github/workflows/deploy-web.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        working-directory: smart-tasks-android
        run: npm install
      - name: Build
        working-directory: smart-tasks-android
        run: npm run build
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: smart-tasks-android/dist
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
